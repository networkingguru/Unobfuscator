output_dir: ./output
cache_dir: ./data/cache
db_path: ./data/unobfuscator.db

workers:
  text: 4
  pdf: 10

matching:
  min_overlap_chars: 200
  similarity_threshold: 0.40
  email_header_min_matches: 2

polling:
  interval_minutes: 60

ocr:
  min_words_per_page: 50

memory:
  limit_percent: 70

redaction_markers:
  - "[REDACTED]"
  - "[Redacted]"
  - "[REDACTED TEXT]"
  - "[REDACTED PER]"
  - "[Sender information redacted]"
  - "[b(6)]"
  - "[b(7)(c)]"
  - "[b(7)(e)]"
  - "XXXXXXXXX"
  - "■■■■■■■"
  - "(redacted)"
  - "*** REDACTED ***"
  - "<REDACTED>"
