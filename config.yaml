output_dir: ./output
cache_dir: ./data/cache
db_path: ./data/unobfuscator.db

workers:
  text: 4
  pdf: 2

matching:
  min_overlap_chars: 200
  similarity_threshold: 0.70
  email_header_min_matches: 2

polling:
  interval_minutes: 60

redaction_markers:
  - "[REDACTED]"
  - "[REDACTED TEXT]"
  - "[REDACTED PER]"
  - "[b(6)]"
  - "[b(7)(c)]"
  - "[b(7)(e)]"
  - "XXXXXXXXX"
  - "■■■■■■■"
  - "(redacted)"
  - "*** REDACTED ***"
  - "<REDACTED>"
